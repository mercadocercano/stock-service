# .air.toml file para hot reload de Go
root = "."
tmp_dir = "tmp"

[build]
# Comando para construir
cmd = "go build -o ./tmp/main ."
# Binario a ejecutar
bin = "./tmp/main"
# Archivos que se deben vigilar para cambios
include_ext = ["go", "tpl", "tmpl", "html"]
# Directorios a excluir
exclude_dir = ["assets", "tmp", "vendor", ".git"]
# Archivos a excluir
exclude_file = []
# Opciones para depuración
delay = 1000 # ms
stop_on_error = true
log = "air_errors.log"

[log]
# Mostrar log
time = true

[color]
# Colores de los mensajes
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Eliminar binarios temporales al salir
clean_on_exit = true