name: Deploy stock-service to Production

on:
  push:
    branches: [master]

env:
  REGISTRY: registry.digitalocean.com/mc-bootstrap-registry
  IMAGE_NAME: stock-service
  DEPLOYMENT_NAME: stock-service
  CONTAINER_NAME: stock
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and Push Image (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          target: production
          provenance: false
          sbom: false
          build-args: |
            GITHUB_TOKEN=${{ secrets.GO_PRIVATE_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          if echo "$SSH_PRIVATE_KEY" | grep -q '^-----BEGIN'; then
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}

      - name: Deploy to K8s
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
               ${{ env.CONTAINER_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
               -n ${{ env.NAMESPACE }} && \
             kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
               -n ${{ env.NAMESPACE }} --timeout=180s"

      - name: Verify Pod Ready
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             READY=\$(kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -o jsonpath='{.items[0].status.containerStatuses[0].ready}') && \
             IMAGE=\$(kubectl get pods -l app=${{ env.DEPLOYMENT_NAME }} -o jsonpath='{.items[0].spec.containers[0].image}') && \
             echo \\"Pod ready: \$READY\\" && echo \\"Image: \$IMAGE\\" && \
             [ \\"\$READY\\" = 'true' ] || (echo '❌ Pod not ready'; exit 1) && \
             echo '✅ ${{ env.IMAGE_NAME }} is running and healthy'"
