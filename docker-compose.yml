version: '3.8'

services:
  # Stock Service
  stock-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: mc-stock-service
    environment:
      # PostgreSQL configuration (using shared postgres)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: stock_db
      DB_SSLMODE: disable
      # Development environment
      GIN_MODE: debug
      LOG_LEVEL: debug
    ports:
      - "8100:8080"
    volumes:
      - ./src:/app/src:ro
      - ./migrations:/app/migrations:ro
    # Dependencies are handled externally via docker-compose.infra.yml
    networks:
      - saas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "logging=promtail"
      - "service_name=stock-service"

networks:
  saas-network:
    external: true
