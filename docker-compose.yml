version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Setup: crea la DB de stock en el postgres compartido (idempotente)
  # ---------------------------------------------------------------------------
  postgres-setup:
    image: pgvector/pgvector:pg15
    container_name: stock-service-postgres-setup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      sh -c "
        echo 'Creating stock database...' &&
        psql -h lab-postgres -U ${POSTGRES_USER:-postgres} -c 'CREATE DATABASE stock_db;' || true &&
        echo 'Database ready.'
      "
    networks:
      - lab-network

  # Stock Service
  stock-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: mc-stock-service
    environment:
      # PostgreSQL configuration (using shared lab-postgres)
      DB_HOST: lab-postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: stock_db
      DB_SSLMODE: disable
      # Development environment
      GIN_MODE: debug
      LOG_LEVEL: debug
    ports:
      - "8100:8080"
    volumes:
      - ./src:/app/src:ro
      - ./migrations:/app/migrations:ro
    depends_on:
      - postgres-setup
    networks:
      - lab-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "logging=promtail"
      - "service_name=stock-service"

networks:
  lab-network:
    external: true
