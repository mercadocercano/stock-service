version: '3.8'

services:
  # PostgreSQL for stock service
  postgres:
    image: postgres:15-alpine
    container_name: stock-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stock-network

  # stock Service
  stock-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: stock_db
      DB_SSLMODE: disable
    ports:
      - "8100:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock-network

volumes:
  postgres_data:

networks:
  stock-network:
    driver: bridge
