  /stock-entries/bulk:
    post:
      summary: Carga masiva de stock
      description: |
        Registra múltiples entradas de stock en una sola operación.
        Útil para carga inicial de inventario o actualizaciones masivas.
        
        **Implementado en HITO 2** para el flujo de Quickstart.
      tags:
        - Stock Entries
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkStockEntryRequest'
            example:
              entries:
                - variant_sku: "TALADRO-BOSCH-750W"
                  entry_type: "initial_stock"
                  quantity: 50
                  notes: "Stock inicial ferretería"
                - variant_sku: "TALADRO-BOSCH-1000W"
                  entry_type: "initial_stock"
                  quantity: 30
                  notes: "Stock inicial ferretería"
      responses:
        '200':
          description: Resultado de la carga masiva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkStockEntryResponse'
              example:
                success: true
                created: 2
                failed: 0
                errors: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==========================================
  # AVAILABILITY ENDPOINTS (HITO 2)
  # ==========================================
  /availability:
    get:
      summary: Consultar disponibilidad de stock
      description: |
        Endpoint con dos modos de operación según los parámetros enviados.
        
        **Modo 1 - Consulta por SKU (existente):** Cuando se proporciona el parámetro `sku`,
        retorna la disponibilidad de ese único SKU. Requiere headers X-Tenant-ID y Authorization (Bearer).
        
        **Modo 2 - Listado completo (nuevo):** Cuando NO se proporciona `sku`, retorna un listado
        paginado de toda la disponibilidad de stock del tenant. Usa `page` y `page_size` para paginación.
        
        El stock se calcula automáticamente mediante un trigger en la base de datos.
      tags:
        - Availability
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: sku
          in: query
          description: |
            SKU del producto/variante a consultar. Cuando se proporciona, activa el modo consulta única.
            Cuando se omite, activa el modo listado paginado de todo el inventario del tenant.
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: |
            **Con sku:** Objeto único de disponibilidad (StockAvailability).
            **Sin sku:** Listado paginado (AvailabilityListResponse).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StockAvailability'
                  - $ref: '#/components/schemas/AvailabilityListResponse'
              examples:
                modoConsulta:
                  summary: Modo consulta por SKU (con parámetro sku)
                  value:
                    product_sku: "TALADRO-BOSCH-750W"
                    product_name: "Taladro Bosch 750W"
                    available_quantity: 50
                    reserved_quantity: 0
                    total_quantity: 50
                    unit_of_measure: "unidad"
                    avg_unit_cost: 15000
                    total_value: 750000
                    is_low_stock: false
                    is_out_of_stock: false
                    last_entry_at: "2026-03-14T00:00:00Z"
                    updated_at: "2026-03-14T00:00:00Z"
                modoListado:
                  summary: Modo listado paginado (sin parámetro sku)
                  value:
                    items:
                      - product_sku: "TALADRO-BOSCH-750W"
                        product_name: "Taladro Bosch 750W"
                        available_quantity: 50
                        reserved_quantity: 0
                        total_quantity: 50
                        unit_of_measure: "unidad"
                        avg_unit_cost: 15000
                        total_value: 750000
                        is_low_stock: false
                        is_out_of_stock: false
                        last_entry_at: "2026-03-14T00:00:00Z"
                        updated_at: "2026-03-14T00:00:00Z"
                    total_count: 1
                    page: 1
                    page_size: 20
                    total_pages: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /availability/{variant_sku}:
    get:
      summary: Consultar disponibilidad por SKU
      description: Obtiene la disponibilidad de stock para una variante específica
      tags:
        - Availability
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: variant_sku
          in: path
          required: true
          schema:
            type: string
          description: SKU de la variante
      responses:
        '200':
          description: Disponibilidad de la variante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockAvailability'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'