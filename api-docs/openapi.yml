openapi: 3.1.0
info:
  title: Multi-Tenant Stock API
  version: 1.0.0
  description: API para gestión de stock multi-tenant (almacenes, ubicaciones y stock)

servers:
  - url: /stock/api/v1
    description: Base URL para la API v1
  - url: http://localhost:8081/stock/api/v1
    description: Servidor local de desarrollo

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para autenticación
    tenantId:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: ID del tenant para operaciones multi-tenant

  parameters:
    # Parámetros básicos de paginación y filtrado
    PageParam:
      name: page
      in: query
      description: "Número de página (default: 1)"
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    
    PageSizeParam:
      name: page_size
      in: query
      description: "Tamaño de página (default: 10, max: 100)"
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    
    SortByParam:
      name: sort_by
      in: query
      description: "Campo de ordenamiento (default: created_at)"
      required: false
      schema:
        type: string
        default: "created_at"
    
    SortDirParam:
      name: sort_dir
      in: query
      description: "Dirección de ordenamiento (asc o desc, default: desc)"
      required: false
      schema:
        type: string
        enum: ["asc", "desc"]
        default: "desc"

    # Parámetros específicos para ubicaciones
    LocationNameParam:
      name: name
      in: query
      description: Filtrar por nombre de ubicación (búsqueda parcial)
      required: false
      schema:
        type: string
    
    LocationTypeParam:
      name: type
      in: query
      description: Filtrar por tipo de ubicación
      required: false
      schema:
        type: string
        enum: ["store", "distribution_center", "warehouse"]
    
    ActiveParam:
      name: active
      in: query
      description: Filtrar por estado activo/inactivo
      required: false
      schema:
        type: boolean

  schemas:
    # Esquemas de entidades principales
    Location:
      type: object
      required:
        - id
        - tenant_id
        - name
        - type
        - active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la ubicación
        tenant_id:
          type: string
          format: uuid
          description: ID del tenant
        name:
          type: string
          description: Nombre de la ubicación
        type:
          type: string
          enum: ["store", "distribution_center", "warehouse"]
          description: Tipo de ubicación
        address:
          type: string
          description: Dirección de la ubicación
        city:
          type: string
          description: Ciudad
        state:
          type: string
          description: Estado/Provincia
        country:
          type: string
          description: País
        postal_code:
          type: string
          description: Código postal
        active:
          type: boolean
          description: Indica si la ubicación está activa
        created_at:
          type: string
          format: date-time
          description: Fecha y hora de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha y hora de última actualización

    Warehouse:
      type: object
      required:
        - id
        - tenant_id
        - location_id
        - name
        - code
        - type
        - active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: ID único del almacén
        tenant_id:
          type: string
          format: uuid
          description: ID del tenant
        location_id:
          type: string
          format: uuid
          description: ID de la ubicación
        name:
          type: string
          description: Nombre del almacén
        code:
          type: string
          description: Código del almacén
        type:
          type: string
          description: Tipo de almacén
        description:
          type: string
          description: Descripción del almacén
        priority:
          type: integer
          description: Prioridad del almacén
        capacity:
          type: number
          description: Capacidad del almacén
        active:
          type: boolean
          description: Indica si el almacén está activo
        created_at:
          type: string
          format: date-time
          description: Fecha y hora de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha y hora de última actualización

    StockLocation:
      type: object
      required:
        - id
        - tenant_id
        - warehouse_id
        - name
        - code
        - active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la ubicación de stock
        tenant_id:
          type: string
          format: uuid
          description: ID del tenant
        warehouse_id:
          type: string
          format: uuid
          description: ID del almacén
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID de la ubicación de stock padre (opcional)
        name:
          type: string
          description: Nombre de la ubicación de stock
        code:
          type: string
          description: Código de la ubicación de stock
        type:
          type: string
          description: Tipo de ubicación de stock
        description:
          type: string
          description: Descripción de la ubicación de stock
        capacity:
          type: number
          description: Capacidad de la ubicación de stock
        active:
          type: boolean
          description: Indica si la ubicación de stock está activa
        created_at:
          type: string
          format: date-time
          description: Fecha y hora de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha y hora de última actualización

    # Respuestas paginadas
    LocationListResponse:
      type: object
      required:
        - items
        - total_count
        - page
        - page_size
        - total_pages
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Location'
        total_count:
          type: integer
          description: Total de elementos
        page:
          type: integer
          description: Página actual
        page_size:
          type: integer
          description: Tamaño de página
        total_pages:
          type: integer
          description: Total de páginas

    WarehouseListResponse:
      type: object
      required:
        - items
        - total_count
        - page
        - page_size
        - total_pages
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Warehouse'
        total_count:
          type: integer
          description: Total de elementos
        page:
          type: integer
          description: Página actual
        page_size:
          type: integer
          description: Tamaño de página
        total_pages:
          type: integer
          description: Total de páginas

    StockLocationListResponse:
      type: object
      required:
        - items
        - total_count
        - page
        - page_size
        - total_pages
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StockLocation'
        total_count:
          type: integer
          description: Total de elementos
        page:
          type: integer
          description: Página actual
        page_size:
          type: integer
          description: Tamaño de página
        total_pages:
          type: integer
          description: Total de páginas

    # Esquemas de error
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Mensaje de error
        details:
          type: string
          description: Detalles adicionales del error

  responses:
    BadRequest:
      description: Solicitud incorrecta
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: No autorizado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Prohibido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflicto
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Error del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  # Ubicaciones
  /locations:
    get:
      summary: Listar ubicaciones con criterios avanzados
      description: Lista ubicaciones con filtros, ordenamiento y paginación
      tags:
        - Locations
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - $ref: '#/components/parameters/LocationNameParam'
        - $ref: '#/components/parameters/LocationTypeParam'
        - $ref: '#/components/parameters/ActiveParam'
        - name: address
          in: query
          description: Filtrar por dirección (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: city
          in: query
          description: Filtrar por ciudad (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: state
          in: query
          description: Filtrar por estado/provincia (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: country
          in: query
          description: Filtrar por país
          required: false
          schema:
            type: string
        - name: postal_code
          in: query
          description: Filtrar por código postal
          required: false
          schema:
            type: string
        - name: active_only
          in: query
          description: Mostrar solo ubicaciones activas
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de ubicaciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: []

  /locations/stores:
    get:
      summary: Listar tiendas
      description: Lista solo ubicaciones de tipo tienda
      tags:
        - Locations
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - $ref: '#/components/parameters/LocationNameParam'
        - $ref: '#/components/parameters/ActiveParam'
      responses:
        '200':
          description: Lista de tiendas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: []

  /locations/distribution-centers:
    get:
      summary: Listar centros de distribución
      description: Lista solo ubicaciones de tipo centro de distribución
      tags:
        - Locations
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - $ref: '#/components/parameters/LocationNameParam'
        - $ref: '#/components/parameters/ActiveParam'
      responses:
        '200':
          description: Lista de centros de distribución
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: []

  # Almacenes
  /warehouses:
    get:
      summary: Listar almacenes con criterios avanzados
      description: Lista almacenes con filtros, ordenamiento y paginación
      tags:
        - Warehouses
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - name: name
          in: query
          description: Filtrar por nombre de almacén (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Filtrar por código de almacén (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: type
          in: query
          description: Filtrar por tipo de almacén
          required: false
          schema:
            type: string
        - name: location_id
          in: query
          description: Filtrar por ID de ubicación
          required: false
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ActiveParam'
        - name: description
          in: query
          description: Filtrar por descripción (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: priority
          in: query
          description: Filtrar por prioridad
          required: false
          schema:
            type: integer
        - name: min_capacity
          in: query
          description: Capacidad mínima
          required: false
          schema:
            type: number
        - name: max_capacity
          in: query
          description: Capacidad máxima
          required: false
          schema:
            type: number
        - name: active_only
          in: query
          description: Mostrar solo almacenes activos
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de almacenes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: []

  /locations/{location_id}/warehouses:
    get:
      summary: Listar almacenes por ubicación
      description: Lista almacenes de una ubicación específica
      tags:
        - Warehouses
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la ubicación
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - name: name
          in: query
          description: Filtrar por nombre de almacén (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Filtrar por código de almacén (búsqueda parcial)
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/ActiveParam'
      responses:
        '200':
          description: Lista de almacenes de la ubicación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: []

  # Ubicaciones de Stock
  /stock-locations:
    get:
      summary: Listar ubicaciones de stock con criterios avanzados
      description: Lista ubicaciones de stock con filtros, ordenamiento y paginación
      tags:
        - Stock Locations
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - name: name
          in: query
          description: Filtrar por nombre de ubicación de stock (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Filtrar por código de ubicación de stock (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: warehouse_id
          in: query
          description: Filtrar por ID de almacén
          required: false
          schema:
            type: string
            format: uuid
        - name: parent_id
          in: query
          description: Filtrar por ID de ubicación padre
          required: false
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ActiveParam'
        - name: type
          in: query
          description: Filtrar por tipo de ubicación de stock
          required: false
          schema:
            type: string
        - name: description
          in: query
          description: Filtrar por descripción (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: min_capacity
          in: query
          description: Capacidad mínima
          required: false
          schema:
            type: number
        - name: max_capacity
          in: query
          description: Capacidad máxima
          required: false
          schema:
            type: number
        - name: active_only
          in: query
          description: Mostrar solo ubicaciones de stock activas
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de ubicaciones de stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockLocationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: []

  /warehouses/{warehouse_id}/stock-locations:
    get:
      summary: Listar ubicaciones de stock por almacén
      description: Lista ubicaciones de stock de un almacén específico
      tags:
        - Stock Locations
      parameters:
        - name: warehouse_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del almacén
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - name: name
          in: query
          description: Filtrar por nombre de ubicación de stock (búsqueda parcial)
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: Filtrar por código de ubicación de stock (búsqueda parcial)
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/ActiveParam'
      responses:
        '200':
          description: Lista de ubicaciones de stock del almacén
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockLocationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: []

  /warehouses/{warehouse_id}/stock-locations/roots:
    get:
      summary: Listar ubicaciones de stock raíz por almacén
      description: Lista ubicaciones de stock raíz (sin padre) de un almacén específico
      tags:
        - Stock Locations
      parameters:
        - name: warehouse_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del almacén
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - name: name
          in: query
          description: Filtrar por nombre de ubicación de stock (búsqueda parcial)
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/ActiveParam'
      responses:
        '200':
          description: Lista de ubicaciones de stock raíz del almacén
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockLocationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: []

  /stock-locations/{id}/children:
    get:
      summary: Listar ubicaciones de stock hijas
      description: Lista ubicaciones de stock hijas de una ubicación específica
      tags:
        - Stock Locations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la ubicación de stock padre
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - name: name
          in: query
          description: Filtrar por nombre de ubicación de stock (búsqueda parcial)
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/ActiveParam'
      responses:
        '200':
          description: Lista de ubicaciones de stock hijas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockLocationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tenantId: [] 